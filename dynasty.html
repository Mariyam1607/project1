    <div class="dynasty">
        <h2>Османская династия</h2>

            <div id="dynasty_tree"></div>

        <div class="smoke"></div>
    </div>

    <div class="move_block">
        <div class="container">
            <h2>Владения империи</h2>
            <div class="ottoman_map">
                <div class="parent_block">

                    <div class="route">
                        <div class="route-line"></div>
                        <div class="route-arrow"></div>



                        <div class="conquest-text">1517г. - Завоевание Египта</div>
                    </div>


                    <img src="https://www.pngarts.com/files/3/Compass-PNG-Pic.png" class="compass">

                    <div class="child_block"></div>

                </div>
            </div>
        </div>
    </div>

    <div class="stopwatch">
        <div class="container">
            <h2 class="test">ТЕСТ</h2>
            <div class="time">
                <div class="time_block">
                    <div class="interval" id="seconds">0</div>
                </div>
            </div>
            <div class="time_buttons">
                <button class="btn" id="start">Start</button>

            </div>
        </div>
        <div class="quiz">
            <h3 id="question">Вопрос</h3>
            <div class="answers">
                <button class="answer red"></button>
                <button class="answer blue"></button>
                <button class="answer yellow"></button>
                <button class="answer green"></button>
            </div>
        </div>
    </div>


    <div class="footer">
